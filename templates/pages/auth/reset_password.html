<!doctype html>
<html lang="{{ locale }}">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>{{ app_name }} - {{ t("auth.reset.title") }}</title>

    <link rel="icon" type="image/svg+xml" href="/static/icons/icon.svg" />
    <link rel="stylesheet" href="/static/css/auth.css" />
</head>

<body>
    <canvas id="auth-background" aria-hidden="true"></canvas>

    <main class="auth-page">
        <section class="auth-shell" aria-label="{{ t('auth.reset.title') }}">
            <header class="auth-header">
                <div class="auth-tab auth-tab--single">{{ t("auth.reset.title") }}</div>
            </header>

            <section class="auth-content">
                <div class="auth-panel auth-panel--login">
                    <div class="brand">
                        <span class="brand-mark"></span>
                        <div>
                            <p class="brand-label">{{ t("app.subtitle") }}</p>
                            <h1>{{ app_name }}</h1>
                        </div>
                    </div>

                    <p class="auth-description">
                        {{ t("auth.reset.description") }}
                    </p>

                    {% if error %}
                    <div class="auth-error" role="alert">
                        {{ error }}
                    </div>
                    {% endif %}

                    {% if message %}
                    <div class="auth-error" role="status">
                        {{ message }}
                    </div>
                    {% endif %}

                    {% if token_is_valid %}
                    <form class="auth-form" method="post" action="/reset-password" autocomplete="off">
                        {{ csrf_input | safe }}
                        <input type="hidden" name="token" value="{{ token }}" />

                        <label class="field">
                            <span>{{ t("auth.fields.new_password") }}</span>
                            <input type="password" name="password" autocomplete="new-password"
                                placeholder="{{ t('auth.fields.new_password_placeholder') }}" required />
                        </label>

                        <button class="button-primary" type="submit">
                            {{ t("auth.reset.submit") }}
                        </button>
                    </form>
                    {% endif %}

                    <footer class="auth-links">
                        <a href="/login">{{ t("auth.reset.back_to_login") }}</a>
                    </footer>
                </div>
            </section>
        </section>
    </main>

    <script src="/static/vendor/pixi.min.js"></script>
    <script src="/static/js/auth/auth-background.js"></script>
</body>

</html>
