name: gravewright_i5_stress

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8003:8000"
    volumes:
      - ../storage:/app/storage
    deploy:
      resources:
        limits:
          cpus: "6.0"
          memory: 8g
    environment:
      APP_ENV: development
      APP_DEBUG: "false"
      SESSION_SECRET: perf-test-secret-key-change-me
      WEB_WORKERS: "6"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 5s
      timeout: 5s
      retries: 12

  locust:
    image: locustio/locust:2.32.3
    ports:
      - "8091:8089"
    volumes:
      - ./performance/i5_stress:/mnt/locust
    command: >
      -f /mnt/locust/locustfile.py
      --host http://app:8000
      --headless
      --users 500
      --spawn-rate 20
      --run-time 300s
      --html /mnt/locust/report.html
      --csv /mnt/locust/results
    depends_on:
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
