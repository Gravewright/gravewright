name: Bug report
description: Report a reproducible Gravewright bug.
title: "[Bug]: "
labels:
  - "type: bug"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        Gravewright is currently Alpha software. Please do not use issues for security vulnerabilities.
        For security reports, see `SECURITY.md`.

  - type: checkboxes
    id: alpha-warning
    attributes:
      label: Alpha acknowledgement
      options:
        - label: I understand Gravewright is Alpha software and existing tables may break between versions.
          required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Give exact steps to reproduce the issue.
      placeholder: |
        1. Start Gravewright with ...
        2. Create/open ...
        3. Click ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Gravewright version / commit
      placeholder: v0.1.0-alpha.1 or commit SHA
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - engine
        - persistence
        - realtime
        - auth
        - API
        - systems
        - modules
        - scenes/maps
        - actors/items/journals
        - UI
        - documentation
        - unknown
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, browser, deployment mode, database backend.
      placeholder: |
        OS:
        Python:
        Browser:
        Database:
        Running via:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs. Remove secrets, tokens, cookies, session IDs, emails, and private URLs.
      render: text

  - type: checkboxes
    id: sanitization
    attributes:
      label: Sanitization
      options:
        - label: I removed secrets, tokens, cookies, session IDs, private URLs, and personal data from this report.
          required: true
