name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen

      - name: Compile Python files
        run: uv run python -m compileall app tests scripts main.py

      - name: Run unit tests
        run: uv run pytest tests/unit

      - name: Validate performance compose file
        run: docker compose -f tests/docker-compose.perf.yml config